<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cymor Internet Speed Test</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg"></div>

<div class="container">

    <div class="logo">
        ⚡ Cymor Internet Speed Test
    </div>

    <h1>Test Your Internet Speed Now</h1>

    <p class="subtitle">
        Fast • Accurate • Real-Time Results
    </p>

    <button id="startBtn">
        START SPEED TEST
    </button>

    <div class="speed-circle">

        <div class="speed-number" id="mainSpeed">
            0
        </div>

        <div class="speed-unit">
            Mbps
        </div>

    </div>

    <div class="status" id="status">
        Ready to test...
    </div>

    <div class="results">

        <div class="card">
            <h2>DOWNLOAD</h2>
            <p id="download">0 Mbps</p>
        </div>

        <div class="card">
            <h2>UPLOAD</h2>
            <p id="upload">0 Mbps</p>
        </div>

        <div class="card">
            <h2>PING</h2>
            <p id="ping">0 ms</p>
        </div>

    </div>

    <button id="shareBtn">
        SHARE RESULTS
    </button>

</div>

<footer>

    Site made by the Legendary Smiley Cymor <br>
    © CymorTechServices 2026

</footer>

<script src="script.js"></script>

</body>
</html>
