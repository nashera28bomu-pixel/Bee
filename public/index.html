<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cymor News Hub</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div class="logo">
    CYMOR NEWS HUB
  </div>

  <div class="searchBox">
    <input type="text" id="searchInput" placeholder="Search news...">
    <button id="searchBtn">Search</button>
  </div>
</header>

<div class="ticker">
  <marquee id="tickerText">
    Loading breaking news...
  </marquee>
</div>

<section class="categories">
  <button class="cat active" data-cat="general">General</button>
  <button class="cat" data-cat="world">World</button>
  <button class="cat" data-cat="technology">Technology</button>
  <button class="cat" data-cat="sports">Sports</button>
  <button class="cat" data-cat="business">Business</button>
  <button class="cat" data-cat="health">Health</button>
</section>

<section id="hero"></section>

<section id="newsGrid"></section>

<script src="script.js"></script>
</body>
</html>
